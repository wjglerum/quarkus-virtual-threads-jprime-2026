quarkus.http.access-log.enabled=true
quarkus.http.access-log.exclude-pattern=/q/.*
# Cap threads to make saturation visible during the demo (M4 Pro)
#%dev.quarkus.thread-pool.max-threads=50
#%dev.quarkus.thread-pool.queue-size=25

# Suppress verbose WireMock request/response logging
quarkus.log.category."io.quarkiverse.wiremock.devservice.WireMockServer".level=WARN

# WireMock DevService — 3s delay in dev, 100ms in test
%dev.quarkus.wiremock.devservices.files-mapping=src/main/resources/wiremock
%test.quarkus.wiremock.devservices.files-mapping=src/test/resources/wiremock
%dev.quarkus.rest-client.coffee-machine.url=http://localhost:${quarkus.wiremock.devservices.port}
%test.quarkus.rest-client.coffee-machine.url=http://localhost:${quarkus.wiremock.devservices.port}
